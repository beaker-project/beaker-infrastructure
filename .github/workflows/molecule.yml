---
name: Molecule

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

jobs:
  role:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role:
          - base
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core molecule molecule-plugins[docker]

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule
        run: |
          cd roles/${{ matrix.role }}
          molecule test
        env:
          ANSIBLE_FORCE_COLOR: 'true'
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core molecule molecule-plugins[docker]

      - name: Install Ansible collections and roles
        run: |
          ansible-galaxy collection install -r requirements.yml
          ansible-galaxy role install -r requirements.yml -p .external_roles

      - name: Remove vault files
        run: |
          find . -name '*.vault.*' -delete

      - name: Run smoke test
        run: |
          molecule test -s smoke
        env:
          ANSIBLE_FORCE_COLOR: 'true'
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible.cfg
