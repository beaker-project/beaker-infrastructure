---
driver:
  name: docker
platforms:
  - name: centosstream9
    image: ghcr.io/bcook254/docker-centosstream9-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/roles:${MOLECULE_PROJECT_DIRECTORY}/.external_roles
  inventory:
    links:
      group_vars: ../../group_vars
verifier:
  name: ansible
